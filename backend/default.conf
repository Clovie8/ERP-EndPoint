server {
    listen 8080;
    listen [::]:8080;
    
    # ==================================================================
    # REPLACING .htaccess #1 (The Fortress)
    # ------------------------------------------------------------------
    # By setting the root DIRECTLY to the public folder, Nginx physically 
    # cannot see your /app, /Vendor, or .env files. They are 100% walled 
    # off from the internet by default. No "deny" rules even needed!
    # ==================================================================
    root /home/site/wwwroot/backend/public;
    index index.php index.html index.htm;
    server_name _;

    # Extra security: Block access to any hidden files (like .git) just in case
    location ~ /\. {
        deny all;
        return 403;
    }

    # ==================================================================
    # REPLACING .htaccess #2 (The Router)
    # ==================================================================
    
    # 1. HQ API ROUTE (Translates: RewriteRule ^hq-api/(.*)$ hq-api.php)
    location /hq-api/ {
        try_files $uri $uri/ @hq_rewrite;
    }
    location @hq_rewrite {
        rewrite ^/hq-api/(.*)$ /hq-api.php?action=$1 last;
    }

    # 2. MAIN API ROUTE (Translates: RewriteRule ^(.*)$ api.php)
    location / {
        try_files $uri $uri/ @api_rewrite;
    }
    location @api_rewrite {
        rewrite ^/(.*)$ /api.php?action=$1 last;
    }

    # ==================================================================
    # AZURE PHP EXECUTION ENGINE
    # ==================================================================
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}